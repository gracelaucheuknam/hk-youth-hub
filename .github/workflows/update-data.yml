name: 每日更新活動資料

on:
  schedule:
    - cron: "0 22 * * *"        # UTC 22:00 = 香港時間每朝 06:00
  workflow_dispatch:            # 可以手動 trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: 抓取並生成 events.json
        run: python build.py

      - name: 有更新先 commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "冇新資料，唔使 commit"
          else
            git commit -m "資料更新 $(date -u +'%Y-%m-%d')"
            git push
          fi
